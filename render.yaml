## render.yaml - GEOScope 一键部署配置
## 使用前：在 Render Dashboard 设置 DEEPSEEK_API_KEY 环境变量
## 部署方式：连接 GitHub 仓库后，Render 会自动识别此文件

services:
  # ─────────────────────────────────────────
  # 后端：FastAPI + Playwright
  # ─────────────────────────────────────────
  - type: web
    name: geoscope-backend
    runtime: python
    region: singapore          # 就近选择，可改为 oregon / frankfurt
    plan: free                 # 免费实例 512MB RAM；Playwright 较重，建议升级到 starter
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # ── AI 配置（在 Render Dashboard 中覆盖，不要写在此文件） ──
      - key: DEEPSEEK_API_KEY
        sync: false            # sync:false = 部署时从 Dashboard 读取，不写入 git
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      # ── CORS：部署后将前端 URL 填入 Dashboard ──
      - key: GEOSCOPE_CORS_ORIGINS
        sync: false            # 示例值: https://geoscope-frontend.onrender.com
      # ── 运行参数 ──
      - key: GEOSCOPE_REQUIRE_CLIENT_ID
        value: "true"
      - key: GEOSCOPE_ANALYZE_PER_MINUTE
        value: "20"
      - key: GEOSCOPE_AI_CALLS_PER_DAY
        value: "30"
      - key: GEOSCOPE_MAX_CONCURRENT_ANALYZE
        value: "2"
      - key: GEOSCOPE_MAX_CONCURRENT_PLAYWRIGHT
        value: "1"
      - key: GEOSCOPE_ALLOW_PRIVATE_NETWORKS
        value: "false"
      # ── Playwright：跳过系统依赖检查（Render 构建环境权限限制） ──
      - key: PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS
        value: "1"
      # ── 心跳：Render 不会休眠付费套餐，免费套餐 15min 无流量会休眠 ──
      - key: GEOSCOPE_HEARTBEAT_SECONDS
        value: "240"
      - key: GEOSCOPE_HEALTHCHECK_URL
        value: https://geoscope-backend.onrender.com/api/health  # 部署后更新为实际 URL

  # ─────────────────────────────────────────
  # 前端：Next.js SSR
  # ─────────────────────────────────────────
  - type: web
    name: geoscope-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: NODE_ENV
        value: production
      # 部署后将后端 URL 填入 Dashboard，格式: https://geoscope-backend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
